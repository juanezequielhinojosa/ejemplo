<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>La Navaja</title>

    <meta name="description"
        content="Barbería premium especializada en cortes modernos, fade profesional y barba perfecta. Reserva tu turno en Elite Crown Barber.">

    <meta property="og:title" content="La Navaja">
    <meta property="og:description" content="Barbería premium con estilo moderno">
    <meta property="og:type" content="website">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles2.css">
</head>

<body>
 
    <header>

        <nav>

            <div class="logo"> LA NAVAJA</div>

            <ul id="menu">

                <li><a href="#">HOME</a></li>
                <li><a href="#servicios">SERVICIOS</a></li>
                <li><a href="#galeria">GALERÍA</a></li>
                <li><a href="#nosotros">NOSOTROS</a></li>
                <li><a href="#testimonios">TESTIMONIOS</a></li>
                <li><a href="#contacto">CONTACTO</a></li>


            </ul>

            <div class="hamburger" onclick="toggleMenu()">☰</div>
            <div class="hero-line"></div>
        </nav>

    </header>
        <!-- HERO -->
        
        <section class="hero">
            <div class="hero-content">
                <small>DESDE 2015</small>
                <h1>Más que una barbería,<br><span>un estilo de vida</span></h1>
                <p>Donde tradición y tendencia se encuentran.</p>
                <div class="btn" onclick="openModal()">RESERVAR TURNO</div>
            </div>
            <div class="hero-line"></div>
        </section>

   

    <script>
        /* MENU MOBILE */

        function toggleMenu() {

            const menu = document.getElementById("menu")
            const btn = document.querySelector(".hamburger")

            menu.classList.toggle("active")

            if (menu.classList.contains("active")) {
                btn.innerHTML = "✕"
            } else {
                btn.innerHTML = "☰"
            }

        }
        const menuLinks = document.querySelectorAll("#menu a")

        menuLinks.forEach(link => {
            link.addEventListener("click", () => {

                document.getElementById("menu").classList.remove("active")
                document.querySelector(".hamburger").innerHTML = "☰"

            })
        })

        /* SCROLL ANIMATION */

        function reveal() {

            let elements = document.querySelectorAll(".reveal")

            elements.forEach(el => {

                let windowHeight = window.innerHeight
                let elementTop = el.getBoundingClientRect().top

                if (elementTop < windowHeight - 100) {

                    el.classList.add("active")

                }

            })

        }

        window.addEventListener("scroll", reveal);
        reveal();
        /* COUNTER WHEN SCROLL */

        const counters = document.querySelectorAll(".counter");

        const startCounter = (counter) => {

            const update = () => {

                const target = +counter.getAttribute("data-target");
                const count = +counter.innerText;

                const increment = target / 100;

                if (count < target) {

                    counter.innerText = Math.ceil(count + increment);
                    setTimeout(update, 20);

                } else {

                    let value = target;

                    if (target >= 1000) {
                        value = (target / 1000) + "K";
                    }

                    if (target === 10) {
                        value = "10+";
                    }

                    if (target === 50000) {
                        value = "50K+";
                    }

                    counter.innerText = value;

                }

            };

            update();

        };


        const observer = new IntersectionObserver(entries => {

            entries.forEach(entry => {

                if (entry.isIntersecting) {

                    startCounter(entry.target);
                    observer.unobserve(entry.target);

                }

            });

        });


        counters.forEach(counter => {
            observer.observe(counter);
        });
    </script>

</body>

</html>
